<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 6</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <h1>🌸 Lights Out 🌸</h1>
        
        <div class="info">
            <p>Кроків: <span id="moves-counter">0</span></p>
            <p>Ціль: <span id="min-moves">-</span></p>
        </div>
        
        <div id="grid" class="grid"></div>
        
        <div class="controls">
            <button id="btn-restart">Заново</button>
            <button id="btn-new-game">Рівень</button>
        </div>
        <p id="win-message" class="hidden">Вітаю! Перемога! ✨</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
